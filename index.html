<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <h2>Cadastro de Usuário</h2>
	<form id="formCadastro">
            <label for="nome">Nome:<span>*</span></label>
            <input type="text" id="nome" placeholder="Digite seu nome" minlength="3" required>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Digite seu email" required>

            <label for="data">Data de Nascimento:</label>
            <input type="date" id="data" required>

            <div class="genero">
            <label for="genero">Gênero:</label>
            
            <div class="opcoes-genero">
            <div class="masculino">
            <input type="radio" id="masc" name="genero" value="m">
            <label for="masc">Masculino</label><br>
            </div>
            <div class="feminino">
            <input type="radio" id="fem" name="genero" value="f">
            <label for="fem">Feminino</label>
            </div>  
            
            <div class="outros">
            <input type="radio" id="out" name="genero" value="f">
            <label for="out">Outros</label>  
            </div>
            </div>

            </div>

            <label for="senha">Senha:<span>*</span></label>
            <input type="password" id="senha" minlength="6" placeholder=" " required>

            <label for="confirmar-senha">Confirmação de senha:<span>*</span></label>
            <input type="password" id="confirmar-senha" minlength="6" placeholder=" " required>

            <button type="submit">Enviar</button>

            <div class="mensagem" id="mensagemSucesso">
                Dados enviados com sucesso!
            </div>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
